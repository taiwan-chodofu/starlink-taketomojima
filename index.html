<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>西桟橋 — Starlink</title>
<link rel="manifest" href="/manifest.json">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
                 "Noto Sans JP", sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    text-align: center;
    -webkit-font-smoothing: antialiased;
  }

  .place {
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.4);
    margin-bottom: 3rem;
  }

  .date {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.35);
    margin-bottom: 2rem;
  }

  /* 見える場合 */
  .visible .status {
    font-size: 1.1rem;
    color: rgba(255,255,255,0.6);
    margin-bottom: 2.5rem;
    letter-spacing: 0.15em;
  }

  .visible .time {
    font-size: 4rem;
    font-weight: 200;
    letter-spacing: 0.05em;
    margin-bottom: 2.5rem;
    line-height: 1;
  }

  .visible .direction {
    font-size: 1.3rem;
    line-height: 2;
    color: rgba(255,255,255,0.85);
  }

  .visible .direction .context {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.4);
  }

  .visible .arrow {
    font-size: 1.8rem;
    color: rgba(255,255,255,0.3);
    margin: 0.8rem 0;
  }

  .visible .count {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.25);
    margin-top: 3rem;
  }

  /* 見えない場合 */
  .not-visible .status {
    font-size: 1.3rem;
    color: rgba(255,255,255,0.5);
    line-height: 1.8;
  }

  /* エラー */
  .error .status {
    font-size: 1rem;
    color: rgba(255,100,100,0.6);
  }

  .footer {
    position: fixed;
    bottom: 1.5rem;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.15);
    letter-spacing: 0.1em;
  }

  @media (min-width: 600px) {
    .visible .time { font-size: 5.5rem; }
    .visible .direction { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<div class="place">竹富島・西桟橋</div>
<div class="date">{{ target_date }}</div>

{% if error_msg %}
<div class="error">
  <div class="status">{{ error_msg }}</div>
</div>

{% elif result %}
<div class="visible">
  <div class="status">スターリンク 見える</div>
  <div class="time">{{ result.time_str }}</div>
  <div class="direction">
    {{ result.start_dir }}
    <span class="context">（{{ result.start_context }}）</span>
    を見る
  </div>
  <div class="arrow">↓</div>
  <div class="direction">
    {{ result.end_dir }} へ流れる
  </div>
  <div class="count">約{{ result.sat_count }}機の連なり</div>
</div>

{% else %}
<div class="not-visible">
  <div class="status">今夜は<br>見えなそうです</div>
</div>
{% endif %}

<div class="footer">Starlink Train Viewer</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
