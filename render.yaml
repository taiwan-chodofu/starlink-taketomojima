services:
  - type: web
    name: starlink-nishi
    runtime: python
    buildCommand: pip install -r requirements.txt && python -c "from skyfield.api import load; load('de421.bsp')"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
    plan: free
